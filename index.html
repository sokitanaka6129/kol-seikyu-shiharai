<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>請求書管理 - KOL株式会社</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📋</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans JP',sans-serif;background:#f4f2ed;color:#1a1714;font-size:13px;line-height:1.6}
.hd{background:#fff;border-bottom:1px solid #ddd8cf;padding:10px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.logo{font-weight:700;font-size:16px;color:#2d5a27}.logo span{color:#8a8279;font-weight:400;font-size:11px;margin-left:6px}
.hbtns{display:flex;gap:6px;flex-wrap:wrap}
.btn{display:inline-flex;align-items:center;gap:4px;padding:5px 10px;border-radius:8px;font-size:11px;font-family:inherit;font-weight:500;cursor:pointer;border:1px solid #ddd8cf;background:#fff;color:#1a1714;white-space:nowrap}
.btn:hover{background:#faf9f6}.btn-p{background:#2d5a27;color:#fff;border-color:#2d5a27}.btn-p:hover{background:#1e3d1a}
.btn-d{background:#fef3f0;color:#c4371c;border-color:#f9d9d0;font-size:10px;padding:2px 6px;cursor:pointer;border-radius:4px}
.tabs{display:flex;padding:0 20px;background:#fff;border-bottom:1px solid #ddd8cf;overflow-x:auto;min-height:40px;align-items:stretch;-webkit-overflow-scrolling:touch}
.tab{padding:10px 16px;font-size:12px;font-weight:500;color:#8a8279;cursor:pointer;border-bottom:3px solid transparent;white-space:nowrap;display:flex;align-items:center;gap:6px}
.tab:hover{color:#1a1714;background:#faf9f6}.tab.on{color:#2d5a27;border-bottom-color:#2d5a27;font-weight:700;background:#e8f0e7}
.tab .cnt{font-size:9px;background:#ece8e1;color:#5c554a;padding:1px 6px;border-radius:8px;font-weight:600}
.tab.on .cnt{background:#2d5a27;color:#fff}
.info{margin:4px 20px;padding:6px 12px;background:#e8eef6;border:1px solid #c5d6e8;border-radius:8px;font-size:10px;color:#1e4a8a}
.cards{padding:10px 20px;display:flex;gap:8px;overflow-x:auto}
.card{background:#fff;border:1px solid #ddd8cf;border-radius:12px;padding:10px 14px;min-width:130px;flex:1}
.card.g{border-left:4px solid #2d5a27}.card.b{border-left:4px solid #1e4a8a}.card.r{border-left:4px solid #c4371c}
.card .lb{font-size:9px;color:#8a8279;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.card .vl{font-family:'JetBrains Mono',monospace;font-size:16px;font-weight:600;margin-top:2px}
.card .sub{font-size:9px;color:#5c554a}
.drop{margin:0 20px;padding:16px;border:2px dashed #ddd8cf;border-radius:12px;text-align:center;background:#faf9f6;cursor:pointer}
.drop.drag{border-color:#2d5a27;background:#e8f0e7}.drop h3{font-size:12px;font-weight:600}.drop p{font-size:10px;color:#8a8279}.drop input{display:none}
.procs{margin:4px 20px;display:flex;flex-direction:column;gap:3px}
.proc{padding:4px 10px;background:#fff;border:1px solid #ddd8cf;border-radius:8px;font-size:11px;display:flex;align-items:center;gap:6px}
.proc .spin{width:12px;height:12px;border:2px solid #ddd8cf;border-top-color:#2d5a27;border-radius:50%;animation:sp .6s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}.proc.ok{color:#2d5a27}.proc.ng{color:#c4371c}
.cfm{background:#e8f0e7;border:1px solid #2d5a27;border-radius:8px;padding:8px 12px;margin:4px 20px;display:flex;align-items:center;justify-content:space-between;font-size:11px}
.bar{padding:8px 20px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.sbox{display:flex;align-items:center;background:#fff;border:1px solid #ddd8cf;border-radius:8px;padding:0 8px;flex:1;max-width:240px}
.sbox:focus-within{border-color:#2d5a27}.sbox input{border:none;background:none;padding:5px;font-size:12px;font-family:inherit;width:100%;outline:none}
.pills{display:flex;gap:3px}
.pill{padding:3px 10px;border-radius:14px;font-size:10px;border:1px solid #ddd8cf;background:#fff;cursor:pointer;font-family:inherit}
.pill.on{background:#1a1714;color:#fff;border-color:#1a1714}
.tw{padding:0 20px 20px;overflow-x:auto}
.tc{background:#fff;border:1px solid #ddd8cf;border-radius:12px;overflow:hidden}
table{width:100%;border-collapse:collapse;font-size:11px}
thead{background:#2c2a26;color:#e8e4dd}
th{padding:6px 5px;text-align:left;font-weight:500;font-size:9.5px;letter-spacing:.3px;white-space:nowrap;border-right:1px solid #3d3b36}
th:last-child{border-right:none}th.r{text-align:right}
tbody tr{border-bottom:1px solid #ece8e1}tbody tr:hover{background:#faf8f5}
tr.w{background:#fef3f0}tr.w:hover{background:#fdeae5}
td{padding:3px 5px;border-right:1px solid #ece8e1;vertical-align:top}td:last-child{border-right:none}
td.r{text-align:right;font-family:'JetBrains Mono',monospace;font-size:10.5px}td.c{text-align:center}
.tg{display:inline-block;padding:1px 5px;border-radius:3px;font-size:9px;font-weight:600}
.tg.a{background:#e8f0e7;color:#2d5a27}.tg.b{background:#e8eef6;color:#1e4a8a}
.grp{background:#e8f0e7;color:#2d5a27;padding:1px 5px;border-radius:3px;font-family:'JetBrains Mono',monospace;font-size:9.5px;font-weight:600}
.trow{background:#f7f5f1!important;font-weight:600;border-top:2px solid #1a1714}
.wi{color:#c4371c;font-size:11px;cursor:help}.nt{font-size:9.5px;color:#8a8279;max-width:130px;line-height:1.3}.tn{font-size:8px;color:#8a8279}
td.ed{cursor:cell}td.ed:hover{background:rgba(45,90,39,.04)}
td.ig{padding:0!important;background:#fffde8!important}
td.ig input,td.ig select{width:100%;height:100%;min-height:24px;border:2px solid #2d5a27;padding:2px 4px;font-family:inherit;font-size:10.5px;outline:none;background:#fffde8;border-radius:0}
td.ig input[type=number]{font-family:'JetBrains Mono',monospace;text-align:right}
.mv{font-size:9.5px;padding:1px 3px;border:1px solid #ddd8cf;border-radius:3px;background:#faf9f6;cursor:pointer;font-family:inherit;color:#5c554a}
.mv:focus{border-color:#2d5a27;outline:none}
.empty{text-align:center;padding:30px;color:#8a8279}
/* Mobile */
.mobile-cards{display:none;padding:0 12px 20px}
.m-card{background:#fff;border:1px solid #ddd8cf;border-radius:12px;padding:14px;margin-bottom:10px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.m-card.w{border-left:4px solid #c4371c;background:#fef3f0}
.m-card-hd{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.m-card-name{font-weight:700;font-size:14px;flex:1}.m-card-total{font-family:'JetBrains Mono',monospace;font-size:16px;font-weight:700;color:#2d5a27;white-space:nowrap;margin-left:8px}
.m-card-sub{font-size:11px;color:#5c554a;margin-bottom:6px}
.m-card-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px 12px;font-size:11px;margin-bottom:8px}
.m-card-grid dt{color:#8a8279;font-weight:500}.m-card-grid dd{font-family:'JetBrains Mono',monospace;text-align:right}
.m-card-bank{font-size:10px;color:#8a8279;padding-top:6px;border-top:1px solid #ece8e1}
.m-card-note{font-size:10.5px;color:#c4371c;margin-top:6px;padding:6px 8px;background:#fef3f0;border-radius:6px}
.m-card-acts{display:flex;gap:6px;margin-top:8px;justify-content:flex-end;align-items:center}
.m-card-acts select{font-size:11px;padding:4px 8px;border:1px solid #ddd8cf;border-radius:6px;background:#fff;font-family:inherit}
.m-card-acts button{padding:6px 12px;border-radius:6px;font-size:11px;font-family:inherit;cursor:pointer}
.m-edit-btn{background:#e8f0e7;color:#2d5a27;border:1px solid #2d5a27}
.m-del-btn{background:#fef3f0;color:#c4371c;border:1px solid #f9d9d0}
.m-modal{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;display:none;align-items:flex-end;justify-content:center}
.m-modal.open{display:flex}
.m-modal-box{background:#fff;border-radius:16px 16px 0 0;width:100%;max-height:90vh;overflow-y:auto;padding:20px 16px 30px}
.m-modal-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.m-modal-hd h3{font-size:15px;font-weight:700}
.m-form{display:flex;flex-direction:column;gap:10px}
.m-fi{display:flex;flex-direction:column;gap:2px}.m-fi label{font-size:10px;font-weight:600;color:#5c554a}
.m-fi input,.m-fi select{padding:10px;border:1px solid #ddd8cf;border-radius:8px;font-family:inherit;font-size:14px;outline:none}
.m-fi input:focus,.m-fi select:focus{border-color:#2d5a27}
.m-fi-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.m-calc{background:#f4f2ed;border-radius:10px;padding:12px;display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:8px 0}
.m-calc-item{text-align:center}.m-calc-item .lb{font-size:9px;color:#8a8279}.m-calc-item .vl{font-family:'JetBrains Mono',monospace;font-size:15px;font-weight:600}
.m-save-btn{width:100%;padding:14px;background:#2d5a27;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;font-family:inherit;cursor:pointer;margin-top:4px}
@media(max-width:768px){
  .hd{padding:8px 12px;flex-wrap:wrap;gap:8px}.logo{font-size:14px}.hbtns{gap:4px}.hbtns .btn{padding:6px 8px;font-size:10px}
  .tabs{padding:0 8px;min-height:36px}.tab{padding:8px 12px;font-size:11px}
  .info{margin:4px 12px;font-size:9px;padding:5px 10px}
  .cards{padding:8px 12px;gap:6px;flex-wrap:wrap}.card{min-width:calc(50% - 4px);padding:8px 10px}.card .vl{font-size:14px}
  .drop{margin:0 12px;padding:14px}.procs{margin:4px 12px}.bar{padding:6px 12px}.sbox{max-width:100%}
  .tw{display:none}.mobile-cards{display:block}
}
</style>
</head>
<body>
<div class="hd">
  <div class="logo">請求書管理<span>KOL株式会社</span></div>
  <div class="hbtns">
    <button class="btn" onclick="doCSV()">📥CSV</button>
    <button class="btn" onclick="openImp()">📋インポート</button>
    <button class="btn" onclick="addRow()">＋行追加</button>
    <button class="btn" onclick="reGrp()">🔄振分</button>
    <button class="btn" onclick="doReset()">🗑リセット</button>
  </div>
</div>
<div class="tabs" id="T"></div>
<div class="info">📋 支払期限の月 → 入金希望日の月 → どちらもなければ発行日の翌々月に振分。各行の「移動」列で手動変更可</div>
<div class="cards" id="S"></div>
<div class="drop" onclick="openImp()" style="cursor:pointer">
  <h3>📋 Claudeからのデータをインポート</h3>
  <p>チャットでPDFを送る → Claudeがデータ化 → ここにペーストして取込。クリックして開く</p>
</div>
<div class="procs" id="PR"></div><div id="CF"></div>
<!-- Import Modal -->
<div class="m-modal" id="IM" onclick="if(event.target===this)closeImp()">
  <div class="m-modal-box" style="max-width:600px;border-radius:16px;margin:auto">
    <div class="m-modal-hd"><h3>📋 データをインポート</h3><button class="btn" onclick="closeImp()">✕</button></div>
    <div style="padding:16px">
      <div style="display:flex;gap:8px;margin-bottom:12px">
        <button class="btn" id="impTabJson" onclick="setImpTab('json')" style="flex:1;justify-content:center;background:#2d5a27;color:#fff;border-color:#2d5a27">JSON（Claudeから）</button>
        <button class="btn" id="impTabCsv" onclick="setImpTab('csv')" style="flex:1;justify-content:center">CSV（ファイル）</button>
      </div>
      <div id="impJsonArea">
        <p style="font-size:11px;color:#5c554a;margin-bottom:8px">Claudeから受け取ったJSONデータを貼り付け → 取込</p>
        <textarea id="impText" style="width:100%;min-height:180px;padding:10px;border:1px solid #ddd8cf;border-radius:8px;font-family:'JetBrains Mono',monospace;font-size:11px;outline:none;resize:vertical" placeholder="ここにJSONを貼り付け…"></textarea>
      </div>
      <div id="impCsvArea" style="display:none">
        <p style="font-size:11px;color:#5c554a;margin-bottom:8px">CSVファイルを選択 or テキストを貼り付け。このアプリから出力したCSVやExcelからのCSVに対応。</p>
        <div style="display:flex;gap:8px;margin-bottom:8px">
          <button class="btn" onclick="document.getElementById('csvFile').click()" style="flex:1;justify-content:center">📁 CSVファイルを選択</button>
          <input type="file" id="csvFile" accept=".csv,.tsv,.txt" style="display:none" onchange="loadCsvFile(this)">
        </div>
        <textarea id="impCsvText" style="width:100%;min-height:180px;padding:10px;border:1px solid #ddd8cf;border-radius:8px;font-family:'JetBrains Mono',monospace;font-size:11px;outline:none;resize:vertical" placeholder="CSVテキストを貼り付けてもOK…"></textarea>
      </div>
      <div id="impPreview" style="margin-top:8px;font-size:11px;color:#5c554a"></div>
      <div style="display:flex;gap:8px;margin-top:12px;justify-content:flex-end">
        <button class="btn" onclick="closeImp()">キャンセル</button>
        <button class="btn-p" style="padding:8px 20px;border:none;border-radius:8px;font-size:13px;font-family:inherit;cursor:pointer" onclick="doImp()">取込</button>
      </div>
    </div>
  </div>
</div>
<div class="bar">
  <div class="sbox"><span style="color:#8a8279">🔍</span><input placeholder="検索…" id="Q" oninput="rT()"></div>
  <div class="pills"><button class="pill on" onclick="sf('all',this)">すべて</button><button class="pill" onclick="sf('warn',this)">⚠要確認</button><button class="pill" onclick="sf('group',this)">同一先</button></div>
</div>
<div class="tw"><div class="tc"><table><thead id="TH"></thead><tbody id="TB"></tbody></table></div></div>
<div class="mobile-cards" id="MC"></div>
<div class="m-modal" id="MM" onclick="if(event.target===this)closeMM()">
  <div class="m-modal-box">
    <div class="m-modal-hd"><h3 id="MM_title">編集</h3><button class="btn" onclick="closeMM()">✕</button></div>
    <div class="m-form">
      <div class="m-fi"><label>取引先名</label><input id="mm_name"></div>
      <div class="m-fi-row"><div class="m-fi"><label>発行日</label><input id="mm_date" placeholder="2026/03/01"></div><div class="m-fi"><label>請求書番号</label><input id="mm_invNum"></div></div>
      <div class="m-fi"><label>件名/内容</label><input id="mm_subject"></div>
      <div class="m-fi-row"><div class="m-fi"><label>税率</label><select id="mm_rate" onchange="mCalc()"><option value="0.10">10%</option><option value="0.08">8%</option></select></div><div class="m-fi"><label>税抜金額</label><input type="number" id="mm_subtotal" oninput="mCalc()"></div></div>
      <div class="m-fi-row"><div class="m-fi"><label>源泉税</label><input type="number" id="mm_wh" oninput="mCalc()"></div><div class="m-fi"><label>実費/経費</label><input type="number" id="mm_exp" oninput="mCalc()"></div></div>
      <div class="m-calc"><div class="m-calc-item"><div class="lb">消費税</div><div class="vl" id="mm_ptax">-</div></div><div class="m-calc-item"><div class="lb">税込支払額</div><div class="vl" id="mm_ptot" style="color:#2d5a27">-</div></div></div>
      <div class="m-fi-row"><div class="m-fi"><label>支払期限</label><input id="mm_deadline" placeholder="2026/03/31"></div><div class="m-fi"><label>入金希望日</label><input id="mm_payBy"></div></div>
      <div class="m-fi"><label>適格番号</label><input id="mm_tNum" placeholder="T..."></div>
      <div class="m-fi-row"><div class="m-fi"><label>銀行</label><input id="mm_bank"></div><div class="m-fi"><label>支店</label><input id="mm_branch"></div></div>
      <div class="m-fi-row"><div class="m-fi"><label>種別</label><select id="mm_acType"><option>普通</option><option>当座</option></select></div><div class="m-fi"><label>口座番号</label><input id="mm_acNum"></div></div>
      <div class="m-fi"><label>口座名義</label><input id="mm_acName"></div>
      <div class="m-fi"><label>備考</label><input id="mm_note"></div>
      <div class="m-fi"><label>元ファイル</label><input id="mm_file"></div>
      <button class="m-save-btn" onclick="saveMM()">保存する</button>
    </div>
  </div>
</div>

<script>
try{
var F=function(n){return n==null||n===''||isNaN(n)?'':Number(n).toLocaleString('ja-JP')};
var E=function(s){return(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/'/g,'&#39;')};
var SK='kol-invoice-v1';var D={m:{},o:[]};var AM='';var PD=[];var FI='all';var EC=null;

var CL=[
  {k:'name',l:'取引先',w:120,t:'t'},{k:'date',l:'発行日',w:80,t:'t'},{k:'invNum',l:'請求書No',w:88,t:'t'},{k:'subject',l:'件名',w:140,t:'t'},
  {k:'rate',l:'税率',w:44,t:'s',op:[['0.10','10%'],['0.08','8%']]},{k:'subtotal',l:'税抜金額',w:80,t:'n'},{k:'_tax',l:'消費税',w:66,t:'x'},
  {k:'wh',l:'源泉税',w:66,t:'n'},{k:'exp',l:'実費',w:60,t:'n'},{k:'_tot',l:'税込支払額',w:85,t:'x'},{k:'_grp',l:'同一先',w:70,t:'x'},
  {k:'deadline',l:'支払期限',w:80,t:'t'},{k:'payBy',l:'入金希望',w:80,t:'t'},{k:'tNum',l:'適格番号',w:100,t:'t'},
  {k:'bank',l:'銀行',w:88,t:'t'},{k:'branch',l:'支店',w:78,t:'t'},{k:'acType',l:'種別',w:44,t:'s',op:[['普通','普通'],['当座','当座']]},
  {k:'acNum',l:'口座番号',w:68,t:'t'},{k:'acName',l:'口座名義',w:100,t:'t'},{k:'note',l:'備考',w:130,t:'t'},{k:'file',l:'元ファイル',w:100,t:'t'}
];

function pYM(s){if(!s)return null;var x=String(s).match(/(\d{4})\D+(\d{1,2})/);return x?{y:+x[1],m:+x[2]}:null}
function aM(ym,n){if(!ym)return null;var mo=ym.m+n,y=ym.y;while(mo>12){mo-=12;y++}while(mo<1){mo+=12;y--}return{y:y,m:mo}}
function yK(ym){return ym.y+'\u5e74'+ym.m+'\u6708'}
function kY(k){var x=k.match(/(\d{4})\u5e74(\d{1,2})\u6708/);return x?{y:+x[1],m:+x[2]}:null}
function gPM(v){var d=pYM(v.deadline);if(d)return d;var p=pYM(v.payBy);if(p)return p;var t=pYM(v.date);if(t)return aM(t,2);var n=new Date();return{y:n.getFullYear(),m:n.getMonth()+1}}
function srt(){D.o.sort(function(a,b){var x=kY(a),y=kY(b);return(x.y*12+x.m)-(y.y*12+y.m)})}
function eT(k){if(!D.m[k]){D.m[k]=[];D.o.push(k);srt()}}
function cc(v){var t=Math.round((v.subtotal||0)*(v.rate||0));return{tax:t,tot:(v.subtotal||0)+t-(v.wh||0)+(v.exp||0)}}
function gT(ls){var g={};ls.forEach(function(v){var k=v.name+'|'+v.acNum;if(!g[k])g[k]=[];g[k].push(v)});var o={};Object.keys(g).forEach(function(k){var a=g[k];if(a.length>1){var t=a.reduce(function(s,i){return s+cc(i).tot},0);a.forEach(function(i){o[i.id]=t})}});return o}
function cL(){return D.m[AM]||[]}

function importArr(arr){

    if(typeof v.wh==='string')v.wh=parseInt(v.wh.replace(/[,\s]/g,''))||null;

    var ym=gPM(v);var k=yK(ym);eT(k);D.m[k].push(v);count++;

function parseCsv(txt){
  txt=txt.replace(/^\uFEFF/,'');
  var lines=txt.split(/\r?\n/).filter(function(l){return l.trim()});
  if(lines.length<2)return[];
  var hdr=csvSplit(lines[0]);
  var MAP={'\u53d6\u5f15\u5148\u540d':'name','\u53d6\u5f15\u5148':'name','\u53d6\u5f15\u5148\u540d\uff08\u652f\u6255\u5148\uff09':'name','\u767a\u884c\u65e5':'date','\u8acb\u6c42\u66f8\u756a\u53f7':'invNum','\u8acb\u6c42\u66f8No':'invNum','\u4ef6\u540d':'subject','\u4ef6\u540d/\u5185\u5bb9':'subject','\u7a0e\u7387':'rate','\u7a0e\u629c\u91d1\u984d':'subtotal','\u6e90\u6cc9\u7a0e':'wh','\u6e90\u6cc9':'wh','\u5b9f\u8cbb':'exp','\u5b9f\u8cbb/\u7d4c\u8cbb\uff08\u7a0e\u306a\u3057\uff09':'exp','\u652f\u6255\u671f\u9650':'deadline','\u5165\u91d1\u5e0c\u671b\u65e5':'payBy','\u5165\u91d1\u5e0c\u671b':'payBy','\u5165\u91d1\u5e0c\u671b\u65e5/\u632f\u8fbc\u671f\u9650\uff08\u8acb\u6c42\u66f8\u8a18\u8f09\uff09':'payBy','\u9069\u683c\u756a\u53f7':'tNum','\u9069\u683c\u756a\u53f7\uff08\u767b\u9332\u756a\u53f7\uff09':'tNum','\u9280\u884c':'bank','\u632f\u8fbc\u5148\u9280\u884c':'bank','\u652f\u5e97':'branch','\u53e3\u5ea7\u7a2e\u5225':'acType','\u7a2e\u5225':'acType','\u53e3\u5ea7\u756a\u53f7':'acNum','\u53e3\u5ea7\u540d\u7fa9':'acName','\u5099\u8003':'note','\u5099\u8003/\u30e1\u30e2':'note','\u5143\u30d5\u30a1\u30a4\u30eb':'file'};
  var keys=[];for(var i=0;i<hdr.length;i++){var h=hdr[i].trim();keys.push(MAP[h]||null)}
  var results=[];
  for(var r=1;r<lines.length;r++){
    var vals=csvSplit(lines[r]);if(!vals.length)continue;
    var firstVal=(vals[0]||'').trim();if(!firstVal||firstVal==='\u5408\u8a08'||firstVal==='No')continue;
    var obj={};
    for(var c=0;c<keys.length;c++){
      if(!keys[c])continue;var v=(vals[c]||'').trim();
      if(keys[c]==='rate')obj.rate=v.indexOf('10')>=0?0.10:0.08;
      else if(keys[c]==='subtotal'||keys[c]==='wh'||keys[c]==='exp'){var n=parseInt(v.replace(/[,\s\u00a5\\]/g,''));obj[keys[c]]=isNaN(n)||n===0?null:n}
      else obj[keys[c]]=v;
    }
    if(obj.name)results.push(obj);
  }
  return results;
}
function csvSplit(line){
  var result=[],cur='',inQ=false;
  for(var i=0;i<line.length;i++){var ch=line[i];if(inQ){if(ch==='"'&&line[i+1]==='"'){cur+='"';i++}else if(ch==='"')inQ=false;else cur+=ch}else{if(ch==='"')inQ=true;else if(ch===','){result.push(cur);cur=''}else cur+=ch}}
  result.push(cur);return result;
}

function doCSV(){
  var ls=cL(),gt=gT(ls);
  var h=['No','\u53d6\u5f15\u5148\u540d','\u767a\u884c\u65e5','\u8acb\u6c42\u66f8\u756a\u53f7','\u4ef6\u540d','\u7a0e\u7387','\u7a0e\u629c\u91d1\u984d','\u6d88\u8cbb\u7a0e','\u6e90\u6cc9\u7a0e','\u5b9f\u8cbb','\u7a0e\u8fbc\u652f\u6255\u984d','\u652f\u6255\u671f\u9650','\u5165\u91d1\u5e0c\u671b\u65e5','\u9069\u683c\u756a\u53f7','\u9280\u884c','\u652f\u5e97','\u53e3\u5ea7\u7a2e\u5225','\u53e3\u5ea7\u756a\u53f7','\u53e3\u5ea7\u540d\u7fa9','\u540c\u4e00\u5148\u5408\u8a08','\u5099\u8003','\u5143\u30d5\u30a1\u30a4\u30eb'];
  var csv='\uFEFF'+h.join(',')+'\n';
  for(var i=0;i<ls.length;i++){var v=ls[i],c=cc(v);csv+=[i+1,'"'+v.name+'"',v.date,v.invNum,'"'+v.subject+'"',Math.round(v.rate*100)+'%',v.subtotal||0,c.tax,v.wh||'',v.exp||'',c.tot,v.deadline,v.payBy,v.tNum,v.bank,v.branch,v.acType,v.acNum,v.acName,gt[v.id]||'','"'+(v.note||'')+'"','"'+(v.file||'')+'"'].join(',')+'\n'}
  var a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));a.download='inv_'+AM+'_'+new Date().toISOString().slice(0,10)+'.csv';a.click();
}
